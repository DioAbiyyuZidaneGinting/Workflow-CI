name: CI — MLflow Training

on:
  push:
    branches: [main, master]
    paths:
      - "MLProject/**"
  workflow_dispatch:

jobs:
  train-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: "1. Checkout repository"
        uses: actions/checkout@v4

      - name: "2. Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "3. Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.0 \
                      pandas==2.2.2 numpy==1.26.4 \
                      matplotlib==3.9.0 seaborn==0.13.2

      - name: "4. Run MLflow Project"
        run: |
          mlflow run MLProject/ \
            -P data_path=telco_churn_preprocessed.csv \
            -P n_estimators=100 \
            -P max_depth=10 \
            --env-manager=local

      - name: "5. Upload training artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.sha }}
          path: |
            mlruns/
            *.png
            *.log
          retention-days: 30
